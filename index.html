<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good Light — Best Hours for Photography</title>
  <meta name="description" content="See exactly when golden hour and blue hour occur for your location today.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #070c18;
      --surface:      #0e1828;
      --border:       rgba(255,255,255,0.06);
      --gold:         #e8a840;
      --gold-light:   #f0c870;
      --blue-hr:      #5880d0;
      --blue-light:   #88aae0;
      --text:         #ddd8cc;
      --text-dim:     #7888a4;
      --text-dimmer:  #3a4560;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', system-ui, sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100%;
      padding: 28px 16px 56px;
      gap: 22px;
    }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 100;
      transition: opacity 0.7s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .loader-dot {
      width: 10px; height: 10px;
      background: var(--gold);
      border-radius: 50%;
      animation: blink 1.4s ease-in-out infinite;
    }
    .loader-text {
      font-size: 0.7rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    @keyframes blink {
      0%,100% { opacity: 0.2; transform: scale(0.7); }
      50%      { opacity: 1;   transform: scale(1.3); }
    }

    /* ── Header ── */
    header { text-align: center; }

    .title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.4rem, 9vw, 4.8rem);
      font-weight: 300;
      letter-spacing: 0.34em;
      line-height: 1;
      color: var(--text);
    }
    .title span { color: var(--gold); }

    .tagline {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 7px;
    }

    #location-name {
      font-size: 0.7rem;
      color: var(--text-dimmer);
      margin-top: 8px;
      letter-spacing: 0.08em;
      min-height: 1em;
    }

    /* ── Canvas ── */
    #wheel { display: block; cursor: crosshair; }

    /* ── Tooltip ── */
    #ring-tooltip {
      position: fixed;
      background: rgba(14,24,40,0.92);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 11px;
      font-size: 0.66rem;
      letter-spacing: 0.1em;
      color: var(--text);
      pointer-events: none;
      display: none;
      z-index: 50;
      backdrop-filter: blur(4px);
    }

    /* ── Quality section ── */
    .quality-section {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      min-height: 80px;
    }

    #quality-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 1.2s ease;
    }
    #quality-label.golden    { color: var(--gold); }
    #quality-label.blue-hour { color: var(--blue-light); }
    #quality-label.day       { color: #90b8d8; }
    #quality-label.harsh     { color: #c8a090; }
    #quality-label.night     { color: var(--text-dimmer); }

    #sun-times {
      font-size: 0.62rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
    }
    #next-event {
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-dimmer);
      min-height: 1em;
    }

    /* ── Schedule cards ── */
    .schedule {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 520px;
    }
    @media (min-width: 540px) {
      .schedule { grid-template-columns: repeat(4, 1fr); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 15px 10px 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.7s, background 0.7s, box-shadow 0.7s;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 14px 14px 0 0;
      background: transparent;
      transition: background 0.7s;
    }
    .card.active-gold {
      border-color: rgba(232,168,64,0.3);
      background: rgba(232,168,64,0.04);
      box-shadow: 0 0 24px rgba(232,168,64,0.08);
    }
    .card.active-gold::before {
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .card.active-blue {
      border-color: rgba(88,128,208,0.3);
      background: rgba(88,128,208,0.04);
      box-shadow: 0 0 24px rgba(88,128,208,0.09);
    }
    .card.active-blue::before {
      background: linear-gradient(90deg, transparent, var(--blue-light), transparent);
    }

    .card-icon   { font-size: 1.25rem; line-height: 1; }
    .card-period { font-size: 0.54rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dimmer); }
    .card-type   { font-size: 0.57rem; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 500; }
    .card-type.gold { color: var(--gold); }
    .card-type.blue { color: var(--blue-light); }
    .card-time   { font-family: 'Cormorant Garamond', serif; font-size: 0.92rem; letter-spacing: 0.04em; color: var(--text); white-space: nowrap; }
    .card-dur    { font-size: 0.56rem; color: var(--text-dimmer); }

    /* ── Footer ── */
    footer { font-size: 0.58rem; letter-spacing: 0.1em; color: var(--text-dimmer); opacity: 0.5; text-align: center; }

    /* ── Error banner ── */
    #error-banner {
      display: none;
      background: rgba(180,60,40,0.12);
      border: 1px solid rgba(180,60,40,0.25);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.66rem;
      letter-spacing: 0.08em;
      color: #d09080;
      text-align: center;
      max-width: 520px;
      width: 100%;
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading">
    <div class="loader-dot"></div>
    <div class="loader-text" id="loader-msg">Locating you…</div>
  </div>

  <!-- Error banner -->
  <div id="error-banner"></div>

  <!-- Tooltip -->
  <div id="ring-tooltip"></div>

  <header>
    <h1 class="title">GOOD <span>LIGHT</span></h1>
    <p class="tagline">Best hours for photography</p>
    <p id="location-name">—</p>
  </header>

  <canvas id="wheel" aria-label="24-hour photography light guide"></canvas>

  <div class="quality-section">
    <div id="quality-label" class="night">Night</div>
    <div id="sun-times">—</div>
    <div id="next-event">—</div>
  </div>

  <div class="schedule">
    <div class="card" id="card-blue-am">
      <div class="card-icon">🌙</div>
      <div class="card-period">Morning</div>
      <div class="card-type blue">Blue Hour</div>
      <div class="card-time" id="blue-am-time">—</div>
      <div class="card-dur"  id="blue-am-dur">—</div>
    </div>
    <div class="card" id="card-gold-am">
      <div class="card-icon">🌅</div>
      <div class="card-period">Morning</div>
      <div class="card-type gold">Golden Hour</div>
      <div class="card-time" id="gold-am-time">—</div>
      <div class="card-dur"  id="gold-am-dur">—</div>
    </div>
    <div class="card" id="card-gold-pm">
      <div class="card-icon">🌇</div>
      <div class="card-period">Evening</div>
      <div class="card-type gold">Golden Hour</div>
      <div class="card-time" id="gold-pm-time">—</div>
      <div class="card-dur"  id="gold-pm-dur">—</div>
    </div>
    <div class="card" id="card-blue-pm">
      <div class="card-icon">🌆</div>
      <div class="card-period">Evening</div>
      <div class="card-type blue">Blue Hour</div>
      <div class="card-time" id="blue-pm-time">—</div>
      <div class="card-dur"  id="blue-pm-dur">—</div>
    </div>
  </div>

  <footer id="footer-date">Light data · <span id="today-date"></span></footer>

<script>
/* =========================================================
   GOOD LIGHT — Photography Golden Hour Guide
   Canvas "Light Wheel" + Sunrise-Sunset API
   ========================================================= */

const canvas  = document.getElementById('wheel');
const ctx     = canvas.getContext('2d');
const tooltip = document.getElementById('ring-tooltip');
const TAU     = Math.PI * 2;
// midnight (00:00) sits at the top (12 o'clock position)
const RING_START = -Math.PI / 2;

// ── State ────────────────────────────────────────────────
let solar        = null;   // parsed solar data
let skyRingCache = null;   // offscreen canvas for static ring
let animId       = null;

// Deterministic star positions for centre sky (no Math.random — consistent across reloads)
const STARS = Array.from({ length: 42 }, (_, i) => {
  const a  = i * 2.399963;                      // golden angle for even Fibonacci distribution
  const r  = Math.sqrt((i + 0.5) / 42) * 0.82; // radius via square-root for uniform density
  const sz = 0.4 + (i % 7) * (0.7 / 6);        // size cycles 0.4 → 1.1
  const op = 0.35 + (i % 5) * (0.55 / 4);      // opacity cycles 0.35 → 0.90
  return { x: r * Math.cos(a), y: r * Math.sin(a), sz, op };
});

// ── Canvas sizing ─────────────────────────────────────────
function resize() {
  const s = Math.min(window.innerWidth - 32, 520);
  canvas.width  = s;
  canvas.height = s;
  skyRingCache  = null;   // invalidate cache
}
resize();
window.addEventListener('resize', () => { resize(); if (solar) redraw(); });

// ── Colour helpers ────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }

function lerpRGB(c1, c2, t) {
  return [
    Math.round(lerp(c1[0], c2[0], t)),
    Math.round(lerp(c1[1], c2[1], t)),
    Math.round(lerp(c1[2], c2[2], t)),
  ];
}

function rgbStr([r, g, b]) { return `rgb(${r},${g},${b})`; }
function rgbaStr([r, g, b], a) { return `rgba(${r},${g},${b},${a})`; }

// ── Sky colour for a time in minutes [0,1440) ─────────────
function getSkyColor(mins, s) {
  const m = ((mins % 1440) + 1440) % 1440;

  // Key colour stops anchored to actual solar events
  const gAMend  = s.sunrise + 60;
  const gPMst   = s.sunset  - 60;

  const stops = [
    [0,                              [5,  8, 22]],
    [s.astroBegin,                   [8, 13, 35]],
    [s.nautBegin,                    [14, 24, 62]],
    [s.civilBegin,                   [22, 48,120]],
    [s.civilBegin + (s.sunrise - s.civilBegin) * 0.55, [38, 62,148]], // 55% through civil twilight — mid blue-hour peak
    [s.sunrise - 18,                 [95, 65,115]],
    [s.sunrise,                      [225,125, 52]],
    [s.sunrise + 35,                 [242,188, 72]],
    [gAMend,                         [145,198,232]],
    [gAMend + 50,                    [ 98,168,225]],
    [s.noon,                         [ 72,138,215]],
    [s.noon + 50,                    [ 98,168,225]],
    [gPMst - 50,                     [145,198,232]],
    [gPMst,                          [242,182, 68]],
    [s.sunset - 18,                  [218,115, 42]],
    [s.sunset,                       [188, 82, 58]],
    [s.sunset + 18,                  [ 95, 55,102]],
    [s.civilEnd - (s.civilEnd - s.sunset) * 0.45, [38, 58,138]], // 45% through evening civil twilight — mid evening blue-hour
    [s.civilEnd,                     [22, 42,110]],
    [s.nautEnd,                      [12, 20, 52]],
    [s.astroEnd,                     [ 7, 11, 30]],
    [1440,                           [ 5,  8, 22]],
  ];

  for (let i = 0; i < stops.length - 1; i++) {
    const [t0, c0] = stops[i];
    const [t1, c1] = stops[i + 1];
    if (m >= t0 && m <= t1) {
      const t = t1 === t0 ? 0 : (m - t0) / (t1 - t0);
      // ease-in-out for smoother blending
      const te = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      return rgbStr(lerpRGB(c0, c1, te));
    }
  }
  return 'rgb(5,8,22)';
}

// ── Build static sky-ring offscreen canvas ────────────────
function buildSkyRing(s) {
  const sz = canvas.width;
  const oc = document.createElement('canvas');
  oc.width  = sz;
  oc.height = sz;
  const oc2 = oc.getContext('2d');
  const cx = sz / 2, cy = sz / 2;
  const outerR = cx * 0.865;
  const innerR = cx * 0.525;
  const SEG = 720; // 2-minute resolution (720 segments × 2 min = 1440 min/day)

  for (let i = 0; i < SEG; i++) {
    const mins = (i / SEG) * 1440;
    const a1 = RING_START + (i / SEG) * TAU;
    const a2 = RING_START + ((i + 1) / SEG) * TAU;

    oc2.beginPath();
    oc2.arc(cx, cy, outerR, a1, a2);
    oc2.arc(cx, cy, innerR, a2, a1, true);
    oc2.closePath();
    oc2.fillStyle = getSkyColor(mins, s);
    oc2.fill();
  }
  return oc;
}

// ── Draw a glowing highlight arc for a time window ────────
function drawGlowArc(cx, cy, outerR, innerR, startM, endM, color, alpha) {
  if (endM <= startM) return;
  const a1   = RING_START + (startM / 1440) * TAU;
  const a2   = RING_START + (endM   / 1440) * TAU;
  const midR = (outerR + innerR) / 2;
  const wid  = (outerR - innerR) * 0.82;

  ctx.save();
  ctx.shadowBlur  = wid * 1.2;
  ctx.shadowColor = color;
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.arc(cx, cy, midR, a1, a2);
  ctx.lineWidth   = wid * 0.45;
  ctx.strokeStyle = color;
  ctx.stroke();
  ctx.restore();
}

// ── Draw stars inside a clipped circle ───────────────────
function drawStars(cx, cy, r, t) {
  STARS.forEach((s, i) => {
    const twinkle = 0.5 + 0.5 * Math.sin(t / 1800 + i * 1.618);
    ctx.beginPath();
    ctx.arc(cx + s.x * r, cy + s.y * r, s.sz, 0, TAU);
    ctx.fillStyle = `rgba(255,255,255,${s.op * twinkle})`;
    ctx.fill();
  });
}

// ── Centre animated sky circle ────────────────────────────
function drawCentre(cx, cy, r, nowMins, t) {
  const status = getLightStatus(nowMins);
  const pulse  = 0.85 + 0.15 * Math.sin(t / 1200);

  // Base sky gradient
  const innerCol = {
    golden:   ['#e8b030', '#b84010'],
    'blue-hour': ['#5878d0', '#10208a'],
    day:      ['#78b0e0', '#2868c0'],
    harsh:    ['#a0c0e0', '#4880c8'],
    night:    ['#101828', '#040a14'],
  }[status.cls] || ['#101828', '#040a14'];

  const g = ctx.createRadialGradient(cx, cy - r * 0.15, r * 0.05, cx, cy, r);
  g.addColorStop(0, innerCol[0]);
  g.addColorStop(1, innerCol[1]);

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, TAU);
  ctx.clip();

  ctx.fillStyle = g;
  ctx.fill();

  if (status.cls === 'night') {
    drawStars(cx, cy, r * 0.88, t);
  }

  // Sun / moon orb
  if (status.cls !== 'night') {
    const oy  = cy - r * 0.25;
    const or2 = r * 0.17 * pulse;
    const sg  = ctx.createRadialGradient(cx, oy, 0, cx, oy, or2 * 2.2);
    if (status.cls === 'golden') {
      sg.addColorStop(0, 'rgba(255,235,80,0.95)');
      sg.addColorStop(0.45, 'rgba(255,180,40,0.55)');
      sg.addColorStop(1, 'rgba(255,140,20,0)');
    } else {
      sg.addColorStop(0, 'rgba(210,230,255,0.85)');
      sg.addColorStop(0.5, 'rgba(160,200,255,0.35)');
      sg.addColorStop(1, 'rgba(120,170,255,0)');
    }
    ctx.beginPath();
    ctx.arc(cx, oy, or2 * 2.2, 0, TAU);
    ctx.fillStyle = sg;
    ctx.fill();
    // Solid core
    ctx.beginPath();
    ctx.arc(cx, oy, or2, 0, TAU);
    ctx.fillStyle = status.cls === 'golden' ? '#ffe060' : '#daeaff';
    ctx.fill();
  } else {
    // Moon crescent
    const mx = cx + r * 0.08, my = cy - r * 0.2, mr = r * 0.15;
    ctx.beginPath();
    ctx.arc(mx, my, mr, 0, TAU);
    ctx.fillStyle = 'rgba(210,225,255,0.7)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(mx + mr * 0.45, my - mr * 0.05, mr * 0.85, 0, TAU);
    ctx.fillStyle = innerCol[1];
    ctx.fill();
  }

  // Subtle horizon line for golden / blue hour
  if (status.cls === 'golden' || status.cls === 'blue-hour') {
    const hg = ctx.createLinearGradient(cx - r, cy + r * 0.25, cx + r, cy + r * 0.25);
    const hc = status.cls === 'golden'
      ? 'rgba(240,190,60,' : 'rgba(100,150,240,';
    hg.addColorStop(0, hc + '0)');
    hg.addColorStop(0.5, hc + '0.18)');
    hg.addColorStop(1, hc + '0)');
    ctx.fillStyle = hg;
    ctx.fillRect(cx - r, cy + r * 0.1, r * 2, r * 0.55);
  }

  ctx.restore();

  // Inner ring border
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, TAU);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// ── Main draw function ────────────────────────────────────
function redraw() {
  if (!solar) return;
  const sz = canvas.width;
  const cx = sz / 2, cy = sz / 2;
  const outerR = cx * 0.865;
  const innerR = cx * 0.525;
  const t      = performance.now();

  ctx.clearRect(0, 0, sz, sz);

  // Dark backing disc
  ctx.beginPath();
  ctx.arc(cx, cy, outerR + 2, 0, TAU);
  ctx.fillStyle = '#040810';
  ctx.fill();

  // Sky ring (static, cached)
  if (!skyRingCache) skyRingCache = buildSkyRing(solar);
  ctx.drawImage(skyRingCache, 0, 0);

  // Golden-hour glow arcs (pulse slightly)
  const gPulse = 0.32 + 0.08 * Math.sin(t / 900);
  const bPulse = 0.28 + 0.07 * Math.sin(t / 1100);

  // Morning blue hour: civil begin → sunrise
  drawGlowArc(cx, cy, outerR, innerR,
    solar.civilBegin, solar.sunrise, '#4468d0', bPulse);

  // Morning golden hour: sunrise → sunrise+60
  drawGlowArc(cx, cy, outerR, innerR,
    solar.sunrise, solar.sunrise + 60, '#e8a040', gPulse);

  // Evening golden hour: sunset-60 → sunset
  drawGlowArc(cx, cy, outerR, innerR,
    solar.sunset - 60, solar.sunset, '#e8a040', gPulse);

  // Evening blue hour: sunset → civil end
  drawGlowArc(cx, cy, outerR, innerR,
    solar.sunset, solar.civilEnd, '#4468d0', bPulse);

  // Hour tick marks + labels
  const majorSz = sz * 0.022;
  for (let h = 0; h < 24; h++) {
    const angle = RING_START + (h / 24) * TAU;
    const isMaj = h % 6 === 0;
    const r1 = outerR + (isMaj ? 5 : 2);
    const r2 = outerR + (isMaj ? 14 : 8);
    ctx.beginPath();
    ctx.moveTo(cx + r1 * Math.cos(angle), cy + r1 * Math.sin(angle));
    ctx.lineTo(cx + r2 * Math.cos(angle), cy + r2 * Math.sin(angle));
    ctx.strokeStyle = isMaj ? 'rgba(255,255,255,0.32)' : 'rgba(255,255,255,0.1)';
    ctx.lineWidth   = isMaj ? 1.5 : 1;
    ctx.stroke();

    if (isMaj) {
      const lr = outerR + 23;
      ctx.font         = `${majorSz}px Montserrat, sans-serif`;
      ctx.fillStyle    = 'rgba(200,195,185,0.45)';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(
        h === 0 ? '00' : String(h),
        cx + lr * Math.cos(angle),
        cy + lr * Math.sin(angle)
      );
    }
  }

  // Current-time needle + dot
  const now    = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
  const nowAng = RING_START + (nowMin / 1440) * TAU;
  const dotR   = (outerR + innerR) / 2;
  const dotX   = cx + dotR * Math.cos(nowAng);
  const dotY   = cy + dotR * Math.sin(nowAng);

  // Thin needle from centre
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(dotX, dotY);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth   = 1;
  ctx.stroke();

  // Glow halo around dot
  const gs = sz * 0.02;
  const gg = ctx.createRadialGradient(dotX, dotY, 0, dotX, dotY, gs * 2.8);
  gg.addColorStop(0,   'rgba(255,255,255,0.95)');
  gg.addColorStop(0.4, 'rgba(255,210,100,0.5)');
  gg.addColorStop(1,   'rgba(255,200,80,0)');
  ctx.beginPath();
  ctx.arc(dotX, dotY, gs * 2.8, 0, TAU);
  ctx.fillStyle = gg;
  ctx.fill();
  // Solid core dot
  ctx.beginPath();
  ctx.arc(dotX, dotY, gs, 0, TAU);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  // Centre sky circle
  drawCentre(cx, cy, innerR * 0.92, nowMin, t);
}

// ── Animation loop ────────────────────────────────────────
function animate() {
  redraw();
  updateUI();
  animId = requestAnimationFrame(animate);
}

// ── Light-status for current time ────────────────────────
function getLightStatus(mins) {
  if (!solar) return { label: 'Night', cls: 'night' };
  const { civilBegin, sunrise, sunset, civilEnd } = solar;
  const m = ((mins % 1440) + 1440) % 1440;

  if (m >= sunrise      && m <= sunrise + 60) return { label: 'Golden Hour',  cls: 'golden' };
  if (m >= sunset - 60  && m <= sunset)        return { label: 'Golden Hour',  cls: 'golden' };
  if (m >= civilBegin   && m < sunrise)         return { label: 'Blue Hour',    cls: 'blue-hour' };
  if (m > sunset        && m <= civilEnd)       return { label: 'Blue Hour',    cls: 'blue-hour' };

  const harshMid   = solar.noon;
  const harshStart = sunrise + 90;
  const harshEnd   = sunset  - 90;
  if (m > harshStart && m < harshEnd) {
    if (Math.abs(m - harshMid) < 90) return { label: 'Harsh Light', cls: 'harsh' };
    return { label: 'Soft Light', cls: 'day' };
  }
  if (m > sunrise + 60 && m < sunset - 60) return { label: 'Soft Light', cls: 'day' };
  return { label: 'Night', cls: 'night' };
}

// ── Next photography event ────────────────────────────────
function getNextEvent(mins) {
  if (!solar) return null;
  const { civilBegin, sunrise, sunset, civilEnd } = solar;
  const m = ((mins % 1440) + 1440) % 1440;

  const events = [
    { name: 'Blue Hour',    time: civilBegin },
    { name: 'Golden Hour',  time: sunrise },
    { name: 'Golden Hour',  time: sunset - 60 },
    { name: 'Blue Hour',    time: sunset },
  ].filter(e => e.time > m);

  if (events.length === 0) {
    // Tomorrow's first blue hour
    return { name: 'Blue Hour', minsUntil: 1440 - m + civilBegin };
  }
  return { name: events[0].name, minsUntil: events[0].time - m };
}

// ── Format helpers ────────────────────────────────────────
function fmtTime(d) {
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function fmtMins(m) {
  m = Math.max(0, Math.round(m));
  const h = Math.floor(m / 60), mn = m % 60;
  return h > 0 ? `${h}h ${mn}m` : `${mn}m`;
}
function fmtDur(startD, endD) {
  const mins = Math.round((endD - startD) / 60000);
  return fmtMins(mins);
}

// ── UI update (called every frame) ───────────────────────
function updateUI() {
  const now  = new Date();
  const mins = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
  const st   = getLightStatus(mins);
  const ql   = document.getElementById('quality-label');

  if (ql.textContent !== st.label) ql.textContent = st.label;
  if (!ql.className.includes(st.cls)) ql.className = st.cls;

  const next = getNextEvent(mins);
  document.getElementById('next-event').textContent =
    next ? `${next.name} in ${fmtMins(next.minsUntil)}` : '';

  // Card active states
  const { civilBegin: cb, sunrise: sr, sunset: ss, civilEnd: ce } = solar;
  setActive('card-blue-am', 'blue',  mins >= cb        && mins <  sr);
  setActive('card-gold-am', 'gold',  mins >= sr        && mins <= sr + 60);
  setActive('card-gold-pm', 'gold',  mins >= ss - 60   && mins <= ss);
  setActive('card-blue-pm', 'blue',  mins >  ss        && mins <= ce);
}

function setActive(id, type, active) {
  const el = document.getElementById(id);
  el.classList.toggle(`active-${type}`, active);
}

// ── Parse API response ────────────────────────────────────
function parseSolar(data) {
  const r = data.results;
  const toMins = (s) => {
    const d = new Date(s);
    return d.getHours() * 60 + d.getMinutes() + d.getSeconds() / 60;
  };
  const toDate = (s) => new Date(s);

  return {
    civilBegin:    toMins(r.civil_twilight_begin),
    nautBegin:     toMins(r.nautical_twilight_begin),
    astroBegin:    toMins(r.astronomical_twilight_begin),
    sunrise:       toMins(r.sunrise),
    noon:          toMins(r.solar_noon),
    sunset:        toMins(r.sunset),
    civilEnd:      toMins(r.civil_twilight_end),
    nautEnd:       toMins(r.nautical_twilight_end),
    astroEnd:      toMins(r.astronomical_twilight_end),
    // Full Date objects for display
    civilBeginDate: toDate(r.civil_twilight_begin),
    sunriseDate:    toDate(r.sunrise),
    sunsetDate:     toDate(r.sunset),
    civilEndDate:   toDate(r.civil_twilight_end),
  };
}

// ── Populate schedule cards ───────────────────────────────
function populateCards() {
  const { civilBeginDate: cbD, sunriseDate: srD,
          sunsetDate: ssD, civilEndDate: ceD,
          sunrise: sr, sunset: ss, civilBegin: cb, civilEnd: ce } = solar;

  const goldAMend  = new Date(srD.getTime() + 60 * 60000);
  const goldPMstart = new Date(ssD.getTime() - 60 * 60000);

  // Blue-AM: civil begin → sunrise
  document.getElementById('blue-am-time').textContent =
    `${fmtTime(cbD)} – ${fmtTime(srD)}`;
  document.getElementById('blue-am-dur').textContent =
    fmtDur(cbD, srD);

  // Gold-AM: sunrise → sunrise+60
  document.getElementById('gold-am-time').textContent =
    `${fmtTime(srD)} – ${fmtTime(goldAMend)}`;
  document.getElementById('gold-am-dur').textContent = '60 min';

  // Gold-PM: sunset-60 → sunset
  document.getElementById('gold-pm-time').textContent =
    `${fmtTime(goldPMstart)} – ${fmtTime(ssD)}`;
  document.getElementById('gold-pm-dur').textContent = '60 min';

  // Blue-PM: sunset → civil end
  document.getElementById('blue-pm-time').textContent =
    `${fmtTime(ssD)} – ${fmtTime(ceD)}`;
  document.getElementById('blue-pm-dur').textContent =
    fmtDur(ssD, ceD);

  // Sun times line
  document.getElementById('sun-times').textContent =
    `↑ ${fmtTime(srD)}  ·  ↓ ${fmtTime(ssD)}`;

  // Footer date
  const today = new Date();
  document.getElementById('today-date').textContent =
    today.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

// ── Reverse geocode (OpenStreetMap Nominatim) ─────────────
async function getLocationName(lat, lng) {
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`;
    const res = await fetch(url, {
      headers: {
        'Accept-Language': 'en',
        'User-Agent': 'GoodLight/1.0 (https://github.com/nombrekeff/good_light)',
      },
    });
    if (!res.ok) throw new Error('nominatim error');
    const d = await res.json();
    const city    = d.address?.city || d.address?.town || d.address?.village || d.address?.county || '';
    const country = (d.address?.country_code || '').toUpperCase();
    return city ? `${city}, ${country}` : `${lat.toFixed(2)}°, ${lng.toFixed(2)}°`;
  } catch {
    return `${lat.toFixed(2)}°, ${lng.toFixed(2)}°`;
  }
}

// ── Fetch solar data from sunrise-sunset.org ──────────────
async function fetchSolar(lat, lng) {
  const date = new Date().toISOString().slice(0, 10);
  const url  = `https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&formatted=0&date=${date}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error('Solar API failed');
  const data = await res.json();
  if (data.status !== 'OK') throw new Error('Solar API: ' + data.status);
  return parseSolar(data);
}

// ── Ring tooltip on hover ─────────────────────────────────
canvas.addEventListener('mousemove', (e) => {
  if (!solar) return;
  const rect  = canvas.getBoundingClientRect();
  const scale = canvas.width / rect.width;
  const mx    = (e.clientX - rect.left) * scale;
  const my    = (e.clientY - rect.top)  * scale;
  const cx    = canvas.width / 2, cy = canvas.height / 2;
  const dx    = mx - cx, dy = my - cy;
  const dist  = Math.hypot(dx, dy);
  const outerR = cx * 0.865;
  const innerR = cx * 0.525;

  if (dist >= innerR - 4 && dist <= outerR + 10) {
    let ang = Math.atan2(dy, dx) - RING_START;
    if (ang < 0) ang += TAU;
    const mins = (ang / TAU) * 1440;
    const h    = Math.floor(mins / 60);
    const mn   = String(Math.floor(mins % 60)).padStart(2, '0');
    const st   = getLightStatus(mins);
    tooltip.textContent  = `${String(h).padStart(2,'0')}:${mn}  ·  ${st.label}`;
    tooltip.style.display = 'block';
    tooltip.style.left    = `${e.clientX + 14}px`;
    tooltip.style.top     = `${e.clientY - 32}px`;
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
});

// ── Error display helper ──────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.style.display = 'block';
}

// ── Boot sequence ─────────────────────────────────────────
async function startWithCoords(lat, lng) {
  const [s, name] = await Promise.all([
    fetchSolar(lat, lng),
    getLocationName(lat, lng),
  ]);
  solar = s;
  document.getElementById('location-name').textContent = name;
  populateCards();

  const ld = document.getElementById('loading');
  ld.classList.add('hidden');
  setTimeout(() => { ld.style.display = 'none'; }, 800);
  animate();
}

async function init() {
  if (!navigator.geolocation) {
    document.getElementById('loader-msg').textContent = 'Geolocation unavailable — using default';
    await startWithCoords(51.5074, -0.1278); // London fallback
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      try {
        await startWithCoords(pos.coords.latitude, pos.coords.longitude);
      } catch (err) {
        showError('Could not load light data. Please try refreshing.');
        console.error(err);
      }
    },
    async (err) => {
      const msg = err.code === 1
        ? 'Location permission denied — showing London as example'
        : 'Could not detect location — showing London as example';
      document.getElementById('loader-msg').textContent = msg;
      showError(msg);
      await startWithCoords(51.5074, -0.1278);
    },
    { timeout: 10000, enableHighAccuracy: false }
  );
}

init();
</script>
